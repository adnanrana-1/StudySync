<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySync — Sign In</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #0d1117; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-container { background-color: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 40px; width: 100%; max-width: 450px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); text-align: center; }
        h1 { font-size: 28px; margin-bottom: 8px; font-weight: 700; }
        p.subtitle { color: #8b949e; font-size: 14px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: #8b949e; margin-bottom: 8px; font-weight: 600; }
        input { width: 100%; background-color: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 12px 16px; color: #ffffff; font-size: 14px; transition: border-color 0.2s; }
        input:focus { outline: none; border-color: #58a6ff; }
        button { width: 100%; background-color: #4f46e5; color: #ffffff; border: none; border-radius: 6px; padding: 14px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: background-color 0.2s; }
        button:hover { background-color: #4338ca; }
        .footer-link { margin-top: 20px; font-size: 14px; color: #8b949e; }
        .footer-link a { color: #58a6ff; text-decoration: none; }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to sync your study track</p>

        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="adnan@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit">Sign In</button>
        </form>

        <div class="footer-link">
            Need an account? <a href="/register">Register instead</a>
        </div>
    </div>

    <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: formData.get('email').trim(),
                    password: formData.get('password')
                })
            });

            const data = await response.json();
            if (response.ok) {
                localStorage.setItem('token', data.access_token);
                localStorage.setItem('username', data.username);
                alert('Sign in verified! Moving to your Dashboard...');
                window.location.href = '/dashboard';
            } else {
                alert(`Error: ${data.detail || 'Invalid login details.'}`);
            }
        } catch (error) {
            alert('Could not sync with authentication server.');
        }
    });
    </script>
</body>
</html>
